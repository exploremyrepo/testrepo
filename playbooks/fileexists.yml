---

- name: Check for file existenxe
  hosts: 192.168.1.43,ansible
  vars:
   file: /home/ansible/motd.bkp
  
  tasks:
   - name: using stat to check file
     ansible.builtin.stat:
         path: "{{ file }}"
     register: filestat

   - name: Print reult
     ansible.builtin.debug:
         msg: "the backup is {{ filestat.stat.exists }} "
     when: ansible_distribution == "Ubuntu"
   - name: Actual backup work
     copy: 
       src: /home/ansible/motd
       dest: "{{ file }}"
       remote_src: true
     when: not filestat.stat.exists
